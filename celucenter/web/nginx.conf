# ══════════════════════════════════════════════════════════════════════════════
#  CeluCenter — Configuración Nginx con cabeceras de seguridad
#  Ubicación en producción: /etc/nginx/sites-available/celucenter
# ══════════════════════════════════════════════════════════════════════════════

# Redirige todo el tráfico HTTP → HTTPS (301 permanente)
server {
    listen 80;
    listen [::]:80;
    server_name celucenter.com www.celucenter.com;

    return 301 https://www.celucenter.com$request_uri;
}

# Servidor principal HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.celucenter.com;

    # ── Certificados TLS (Let's Encrypt via certbot) ──────────────────────────
    ssl_certificate     /etc/letsencrypt/live/celucenter.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/celucenter.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Protocolos y cifradores seguros ──────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:
                        ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── OCSP Stapling (verifica validez del certificado sin salir al CA) ──────
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;

    root /var/www/celucenter;
    index index.html;

    # ══════════════════════════════════════════════════════════════════════════
    #  CABECERAS DE SEGURIDAD HTTP
    # ══════════════════════════════════════════════════════════════════════════

    # HSTS: fuerza HTTPS por 1 año en todos los subdominios + preload
    add_header Strict-Transport-Security
        "max-age=31536000; includeSubDomains; preload" always;

    # Evita que el sitio sea incrustado en iframes (clickjacking)
    add_header X-Frame-Options "DENY" always;

    # Impide que el navegador adivine el tipo MIME
    add_header X-Content-Type-Options "nosniff" always;

    # Controla información de referencia enviada a terceros
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permisos de APIs del navegador (cámara, micrófono, geolocalización, etc.)
    add_header Permissions-Policy
        "camera=(), microphone=(), geolocation=(), payment=(self)" always;

    # Content Security Policy completa
    add_header Content-Security-Policy
        "default-src 'self';
         script-src  'self' 'unsafe-inline';
         style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
         font-src    'self' https://fonts.gstatic.com;
         img-src     'self' data: blob: https:;
         connect-src 'self' https://api.celucenter.com wss://api.celucenter.com;
         frame-ancestors 'none';
         upgrade-insecure-requests;" always;

    # ══════════════════════════════════════════════════════════════════════════
    #  CACHÉ Y COMPRESIÓN
    # ══════════════════════════════════════════════════════════════════════════

    # Compresión Gzip para texto
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    # Assets versionados de Flutter → caché de 1 año
    location ~* \.(js|css|wasm|ico|png|jpg|webp|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html → sin caché (siempre fresco)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ══════════════════════════════════════════════════════════════════════════
    #  PROXY INVERSO → API REST (backend Dart en VLAN 10)
    # ══════════════════════════════════════════════════════════════════════════
    location /api/ {
        proxy_pass         http://192.168.10.20:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Rate limiting (definido abajo)
        limit_req zone=api burst=20 nodelay;
    }

    # Webhook de pagos — solo acepta POST
    location /api/pagos/webhook {
        limit_except POST { deny all; }
        proxy_pass http://192.168.10.20:8080;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Flutter Web — todas las rutas apuntan al index.html (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Bloquear acceso a archivos ocultos (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }
}

# ── Rate limiting global ──────────────────────────────────────────────────────
# Define en el bloque http{} de nginx.conf principal:
# limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
