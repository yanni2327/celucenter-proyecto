services:
  - type: web
    name: celucenter-api
    runtime: native
    buildCommand: dart pub get
    startCommand: dart run bin/server.dart
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SENDGRID_API_KEY
        value: PEGAR_AQUI_TU_SENDGRID_API_KEY
      - key: JWT_SECRET
        value: celucenter_jwt_secret_2025
      - key: WEBHOOK_SECRET
        value: celucenter_webhook_secret_2025
